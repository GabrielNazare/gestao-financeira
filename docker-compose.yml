version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gestao-financeira-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestao_financeira
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
